
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Marketing Poster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .poster {
            width: 1200px;
            height: 1600px;
            background: linear-gradient(135deg, #F39C12 0%, #FFFFFF 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
        }
        .poster-top {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            max-height: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .poster-top img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .poster-middle {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            margin: 30px 0;
        }
        .headline {
            font-size: 52px;
            font-weight: 900;
            color: #FFFFFF;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
            line-height: 1.2;
        }
        .subheadline {
            font-size: 28px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            line-height: 1.3;
        }
        .poster-bottom {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .cta-button {
            background-color: #2C3E50;
            color: #F39C12;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cta-button:hover {
            transform: scale(1.05);
        }
        .ratio-info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="ratio-info">Office 3:4 (1200x1600px)</div>
        
        <div class="poster-top">
            <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=1280&q=80" alt="Property Image" />
        </div>
        
        <div class="poster-middle">
            <h1 class="headline">Luxury Doesn't Have to Break the Bank</h1>
            <p class="subheadline">Perfect for your lifestyle</p>
        </div>
        
        <div class="poster-bottom">
            <button class="cta-button">Get Your Quote Today</button>
        </div>
    </div>
</body>
</html>
